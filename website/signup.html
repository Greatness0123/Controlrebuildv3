<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .signup-card {
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        /* Plan Selection */
        .plan-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .plan-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .plan-option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .plan-option.selected {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            box-shadow: 0 0 0 1px #667eea;
        }

        .plan-name {
            display: block;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .plan-price {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary.loading {
            opacity: 0.7;
            cursor: not-allowed;
            position: relative;
            color: transparent;
        }

        .btn-primary.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin: -10px 0 0 -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .messages {
            margin-bottom: 1.5rem;
        }

        .message {
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .message.show {
            display: block;
        }

        .user-id-display {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(102, 126, 234, 0.1);
            border: 1px dashed #667eea;
            border-radius: 0.75rem;
            text-align: center;
            display: none;
        }

        .user-id-display.show {
            display: block;
        }

        .user-id-value {
            display: block;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #667eea;
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
        }

        .password-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }

        .password-strength-bar.weak { width: 33%; background: #ef4444; }
        .password-strength-bar.medium { width: 66%; background: #f59e0b; }
        .password-strength-bar.strong { width: 100%; background: #10b981; }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
            .plan-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="signup-header">
            <div class="logo">Control</div>
            <p class="subtitle">Create your professional account</p>
        </div>

        <div class="messages">
            <div class="message error" id="errorMessage"></div>
            <div class="message success" id="successMessage"></div>
        </div>

        <div class="user-id-display" id="userIdDisplay">
            <p>Registration successful! Your Application Link ID is:</p>
            <span class="user-id-value" id="userIdValue">XXXX-XXXX-XXXX-XXXX</span>
            <p style="font-size: 0.8rem; margin-top: 1rem; color: rgba(255,255,255,0.5)">Use this ID in the desktop app to sync your profile.</p>
        </div>

        <form id="signupForm">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">First Name</label>
                    <input type="text" id="firstName" class="form-input" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Last Name</label>
                    <input type="text" id="lastName" class="form-input" placeholder="Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="john@example.com" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                </div>
            </div>

            <label class="form-label">Select Plan</label>
            <div class="plan-selector">
                <div class="plan-option selected" data-plan="Free">
                    <span class="plan-name">Free</span>
                    <span class="plan-price">$0/mo</span>
                </div>
                <div class="plan-option" data-plan="Pro">
                    <span class="plan-name">Pro</span>
                    <span class="plan-price">$20/mo</span>
                </div>
                <div class="plan-option" data-plan="Master">
                    <span class="plan-name">Master</span>
                    <span class="plan-price">$50/mo</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
        </form>

        <div class="footer-links">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script src="supabase-service.js"></script>
    <script src="signup.js"></script>
</body>
</html>
