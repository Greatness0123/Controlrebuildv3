<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control - Lite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-primary: #000;
            --accent: #000;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --glass-bg: rgba(0, 0, 0, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #fff;
            --accent: #fff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: transparent !important;
            font-family: 'Inter', sans-serif;
        }

        .lite-wrapper {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            gap: 12px;
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        .messages-popup {
            flex: 1;
            max-height: 70vh;
            border-radius: 24px;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 4px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .messages-popup.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .message {
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 90%;
        }

        .message.user {
            align-self: flex-end;
            text-align: right;
            opacity: 0.8;
        }

        .message.ai {
            align-self: flex-start;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .control-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 14px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            background: rgba(128, 128, 128, 0.1);
        }

        .input-bar {
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            resize: none;
            max-height: 100px;
            padding: 10px 0;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .send-btn {
            background: var(--accent);
            color: var(--glass-bg);
        }

        /* Scrollbar */
        .messages-popup::-webkit-scrollbar { width: 4px; }
        .messages-popup::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        /* Drag region */
        .drag-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            pointer-events: none;
            -webkit-app-region: drag;
        }

        .no-drag {
            -webkit-app-region: no-drag;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="drag-handle"></div>

    <div class="lite-wrapper">
        <div class="messages-popup glass no-drag" id="messagesPopup"></div>

        <div class="controls no-drag">
            <button class="control-btn glass" id="workflowBtn" title="Workflows"><i class="fas fa-project-diagram"></i></button>
            <button class="control-btn glass" id="newChatBtn" title="New Chat"><i class="fas fa-plus"></i></button>
            <button class="control-btn glass" id="settingsBtn" title="Settings"><i class="fas fa-cog"></i></button>
            <button class="control-btn glass" id="toggleMessages"><i class="fas fa-chevron-up"></i></button>
        </div>

        <div class="input-bar glass no-drag">
            <button class="icon-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
            <textarea id="chatInput" placeholder="How can I help?" rows="1"></textarea>
            <button class="icon-btn send-btn" id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

    <script src="./js/lib/marked.min.js"></script>
    <script>
        class LiteWindow {
            constructor() {
                this.popup = document.getElementById('messagesPopup');
                this.input = document.getElementById('chatInput');
                this.sendBtn = document.getElementById('sendBtn');
                this.init();
            }

            async init() {
                this.setupListeners();
                const settings = await window.chatAPI.getSettings();
                if (settings.theme === 'dark') document.body.classList.add('dark-mode');

                window.chatAPI.onAIResponse((e, data) => {
                    this.addMessage(data.text || data.message, 'ai');
                    this.forceShowMessages();
                });

                window.chatAPI.onAIStream((e, data) => {
                    this.handleStream(data.chunk);
                    this.forceShowMessages();
                });

                window.chatAPI.onSettingsUpdated((e, s) => {
                    if (s.theme === 'dark') document.body.classList.add('dark-mode');
                    else document.body.classList.remove('dark-mode');

                    // If layout changed back to classic, window manager handles it, but we can close ourselves
                    if (s.layout === 'classic') {
                        // Window manager will hide us
                    }
                });

                this.input.focus();
            }

            setupListeners() {
                document.getElementById('toggleMessages').onclick = () => {
                    const isVisible = this.popup.classList.toggle('visible');
                    document.getElementById('toggleMessages').innerHTML = isVisible ?
                        '<i class="fas fa-chevron-down"></i>' : '<i class="fas fa-chevron-up"></i>';
                    if (isVisible) {
                        this.popup.scrollTop = this.popup.scrollHeight;
                    }
                };

                document.getElementById('settingsBtn').onclick = () => window.chatAPI.showSettings();
                document.getElementById('workflowBtn').onclick = () => window.chatAPI.showWindow('workflow');

                document.getElementById('newChatBtn').onclick = () => {
                    this.popup.innerHTML = '';
                    this.input.value = '';
                    this.popup.classList.remove('visible');
                    document.getElementById('toggleMessages').innerHTML = '<i class="fas fa-chevron-up"></i>';
                };

                this.sendBtn.onclick = () => this.sendMessage();

                this.input.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                };

                this.input.oninput = () => {
                    this.input.style.height = 'auto';
                    this.input.style.height = Math.min(this.input.scrollHeight, 100) + 'px';
                };
            }

            forceShowMessages() {
                if (!this.popup.classList.contains('visible')) {
                    this.popup.classList.add('visible');
                    document.getElementById('toggleMessages').innerHTML = '<i class="fas fa-chevron-down"></i>';
                }
            }

            sendMessage() {
                const text = this.input.value.trim();
                if (!text) return;

                this.addMessage(text, 'user');
                this.forceShowMessages();

                window.chatAPI.executeTask({ text, attachments: [] }, 'act');
                this.input.value = '';
                this.input.style.height = 'auto';

                // Clear stream state
                this.currentStream = null;
                this.streamText = "";
            }

            addMessage(text, sender) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                div.innerHTML = sender === 'ai' ? marked.parse(text) : this.escapeHtml(text);
                this.popup.appendChild(div);
                this.popup.scrollTop = this.popup.scrollHeight;
            }

            handleStream(chunk) {
                if (!this.currentStream) {
                    this.currentStream = document.createElement('div');
                    this.currentStream.className = 'message ai';
                    this.popup.appendChild(this.currentStream);
                }
                this.streamText = (this.streamText || '') + chunk;
                this.currentStream.innerHTML = marked.parse(this.streamText);
                this.popup.scrollTop = this.popup.scrollHeight;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }
        new LiteWindow();
    </script>
</body>
</html>
