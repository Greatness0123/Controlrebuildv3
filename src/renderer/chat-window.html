<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f7;
            --text-primary: #1a1a1a;
            --text-secondary: #65676b;
            --accent: #000000;
            --border: #e4e6eb;
            --user-bubble: #000000;
            --user-text: #ffffff;
            --ai-bubble: #ffffff;
            --ai-text: #1a1a1a;
            --input-bg: #f0f2f5;
        }

        body.dark-mode {
            --bg-primary: #0a0a0a;
            --bg-secondary: #18191a;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --accent: #ffffff;
            --border: #3e4042;
            --user-bubble: #ffffff;
            --user-text: #000000;
            --ai-bubble: #242526;
            --ai-text: #e4e6eb;
            --input-bg: #3a3b3c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: transparent !important;
            color: var(--text-primary);
            overflow: hidden;
        }

        .chat-app {
            height: 100vh;
            display: flex;
            background: var(--bg-primary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg-primary);
        }

        /* Header */
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            -webkit-app-region: drag;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .mode-switcher {
            display: flex;
            background: var(--bg-secondary);
            padding: 2px;
            border-radius: 20px;
            gap: 2px;
        }

        .mode-btn {
            padding: 4px 16px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            background: transparent;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.ai {
            align-self: flex-start;
            width: 100%;
            max-width: 100%;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-content {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .ai .message-content {
            background: transparent;
            color: var(--ai-text);
            padding: 0;
        }

        /* AI Message Styling - Professional Agent Vibe */
        .ai-turn {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .thought-block {
            font-size: 13px;
            color: var(--text-secondary);
            font-style: italic;
            border-left: 2px solid var(--border);
            padding-left: 12px;
            margin: 8px 0;
        }

        .action-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }

        .action-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .response-block {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--bg-primary);
        }

        .input-wrapper {
            background: var(--input-bg);
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 8px 16px;
            gap: 12px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--border);
            background: var(--bg-primary);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.02);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            padding: 8px 0;
            resize: none;
            max-height: 200px;
            min-height: 24px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .send-btn {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Lite Mode Overrides */
        .chat-app.lite-mode {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .lite-mode .chat-header {
            display: none;
        }

        .lite-mode .main-chat {
            background: transparent;
            justify-content: flex-end;
            padding-bottom: 20px;
        }

        .lite-mode .messages-container {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            max-height: 60vh;
            background: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            display: none;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lite-mode .messages-container.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .lite-mode .input-area {
            padding: 0 20px;
            background: transparent;
        }

        .lite-mode .input-wrapper {
            background: var(--bg-primary);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 10px 20px;
        }

        .lite-mode .status-bar {
            display: none;
        }

        /* Lite mode specific buttons */
        .lite-controls {
            display: none;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: center;
        }

        .lite-mode .lite-controls {
            display: flex;
        }

        .lite-control-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .lite-control-btn:hover {
            transform: translateY(-2px);
            background: var(--bg-secondary);
        }

        .lite-control-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* Welcome screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome-logo {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>

<body>
    <div class="chat-app" id="chatApp">
        <main class="main-chat">
            <header class="chat-header">
                <div class="header-left">
                    <button class="icon-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
                    <div class="mode-switcher">
                        <button class="mode-btn active" id="modeAct">ACT</button>
                        <button class="mode-btn" id="modeAsk">ASK</button>
                    </div>
                </div>
                <div class="header-right" style="display: flex; gap: 8px;">
                    <button class="icon-btn" id="workflowBtn"><i class="fas fa-project-diagram"></i></button>
                    <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <img src="./assets/icons/icon-removebg-preview.png" class="welcome-logo">
                    <h1 class="welcome-title">Control</h1>
                    <p style="color: var(--text-secondary);">How can I assist you today?</p>
                </div>
            </div>

            <div id="commandSuggestions" class="command-suggestions" style="display: none;"></div>

            <div class="input-area">
                <div class="lite-controls">
                    <button class="lite-control-btn" id="liteHistoryBtn" title="History"><i class="fas fa-history"></i></button>
                    <button class="lite-control-btn" id="liteWorkflowBtn" title="Workflows"><i class="fas fa-project-diagram"></i></button>
                    <button class="lite-control-btn" id="liteNewChatBtn" title="New Chat"><i class="fas fa-plus"></i></button>
                    <button class="lite-control-btn" id="liteOpacityBtn" title="Toggle Opacity"><i class="fas fa-adjust"></i></button>
                    <button class="lite-control-btn" id="liteSettingsBtn" title="Settings"><i class="fas fa-cog"></i></button>
                    <button class="lite-control-btn" id="liteMessagesToggle" title="Show/Hide Messages"><i class="fas fa-chevron-up"></i></button>
                </div>
                <div id="attachmentsContainer" class="attachments-container"></div>
                <div class="input-wrapper">
                    <div id="inputBackdrop" class="input-backdrop"></div>
                    <button class="icon-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                    <textarea class="chat-input" id="chatInput" placeholder="Describe a task..." rows="1"></textarea>
                    <div id="voiceIndicator" class="voice-indicator"></div>
                    <button class="icon-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
                    <button class="icon-btn send-btn" id="sendBtn" disabled><i class="fas fa-arrow-up"></i></button>
                </div>
                <div class="status-bar" id="statusBar">
                    <div class="status-content" id="statusContent">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Ready</span>
                    </div>
                    <div class="rate-limit-container" id="rateLimitContainer" style="display: none;">
                        <div class="rate-limit-progress-bg">
                            <div id="rateLimitProgress" class="rate-limit-progress"></div>
                        </div>
                        <span id="rateLimitText">0/0</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="./js/lib/marked.min.js"></script>
    <script src="./chat-window.js"></script>
</body>

</html>
