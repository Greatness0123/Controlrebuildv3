<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control - Main Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --text-primary: #000000;
        }

        body.dark-mode {
            --bg-primary: #121212;
            --text-primary: #ffffff;
        }

        body.dark-mode .floating-button .logo {
            filter: brightness(0) invert(1);
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-app-region: no-drag;
            user-select: none;
            color: var(--text-primary);
        }

        /* When non-interactive, disable pointer-events for overlay elements but keep the floating button active */
        body.non-interactive * {
            pointer-events: none;
        }

        body.non-interactive .floating-button {
            pointer-events: auto;
        }

        /* Floating Button */
        .floating-button {
            position: fixed;
            width: 32px;
            height: 32px;
            left: auto;
            top: auto;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            z-index: 10000;
            -webkit-app-region: no-drag;
            border: 1px solid rgba(0, 0, 0, 0.06);
            user-select: none;
            transition: box-shadow 0.3s ease;
        }

        .floating-button:hover {
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
            border-radius: 25%;
        }

        .floating-button:active {
            cursor: grabbing;
        }

        .floating-button.hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: scale(0) !important;
            visibility: hidden !important;
        }

        .floating-button .logo {
            width: 20px;
            height: 20px;
            object-fit: contain;
            filter: none;
        }

        /* Visual Effects */
        .ripple-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.3) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
            animation: ripple 2s ease-out;
        }

        @keyframes ripple {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: scale(1.5);
            }
        }

        /* Status indicator */
        .status-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            backdrop-filter: blur(10px);
            transition: opacity 0.3s ease;
        }

        .status-indicator.show {
            opacity: 1;
        }

        .status-indicator.success {
            background: rgba(42, 44, 43, 0.9);
        }

        .status-indicator.error {
            background: rgba(165, 122, 122, 0.9);
        }

        /* Notification sound indicator */
        .notification-indicator {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .notification-indicator.ping {
            animation: ping 1s ease-out;
        }

        @keyframes ping {
            0% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) scale(3);
            }
        }

        /* Flash overlay - brief full-screen purple gradient flash */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9997;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.3) 50%, rgba(240, 147, 251, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .flash-overlay.active {
            opacity: 1;
            animation: flash-fade 1s ease-out forwards;
        }

        @keyframes flash-fade {
            0% {
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* Edge glow - pulsing with shimmer (transparent, doesn't block screen) */
        .edge-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9996;
            border-radius: 0;
            background: transparent;
            opacity: 0;
            transition: opacity 0.3s ease;
            /* Start with no shadow */
            box-shadow: none;
        }

        .edge-glow.active {
            opacity: 1;
            animation: edge-glow-pulse 2.5s ease-in-out infinite;
        }

        /* Immediate hide class to bypass transition */
        .edge-glow.immediate-hide {
            opacity: 0 !important;
            transition: none !important;
            animation: none !important;
        }

        @keyframes edge-glow-pulse {
            0%, 100% {
                box-shadow:
                    inset 0 0 25px rgba(102, 126, 234, 0.7),
                    inset 0 0 50px rgba(118, 75, 162, 0.4),
                    inset 0 0 80px rgba(240, 147, 251, 0.2);
            }

            50% {
                box-shadow:
                    inset 0 0 45px rgba(118, 75, 162, 0.9),
                    inset 0 0 90px rgba(240, 147, 251, 0.6),
                    inset 0 0 130px rgba(102, 126, 234, 0.3);
            }
        }

        /* Control working indicator - Purple pulsing glass morphed pill */
        .control-working {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(124, 58, 237, 0.25); /* Purple tint */
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            z-index: 10001;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow:
                0 4px 15px rgba(124, 58, 237, 0.2),
                inset 0 0 10px rgba(139, 92, 246, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-working.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            animation: working-pulse 2s ease-in-out infinite;
        }

        @keyframes working-pulse {
            0%, 100% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
                border-color: rgba(139, 92, 246, 0.3);
            }
            50% {
                transform: translateX(-50%) scale(1.05);
                box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
                border-color: rgba(139, 92, 246, 0.6);
            }
        }

        .working-dot {
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            animation: dot-blink 1.5s ease-in-out infinite;
            box-shadow: 0 0 8px #ffffff;
        }

        @keyframes dot-blink {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Border Streak Effect */
        .border-streak {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9995;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .border-streak.active {
            opacity: 1;
        }

        .streak-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.8), transparent);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
        }

        .streak-top { top: 0; left: -100px; width: 100px; height: 2px; animation: move-right 3s linear infinite; }
        .streak-right { top: -100px; right: 0; width: 2px; height: 100px; animation: move-down 3s linear 0.75s infinite; }
        .streak-bottom { bottom: 0; right: -100px; width: 100px; height: 2px; animation: move-left 3s linear 1.5s infinite; }
        .streak-left { bottom: -100px; left: 0; width: 2px; height: 100px; animation: move-up 3s linear 2.25s infinite; }

        @keyframes move-right { from { left: -100px; } to { left: 100%; } }
        @keyframes move-down { from { top: -100px; } to { top: 100%; } }
        @keyframes move-left { from { right: -100px; } to { right: 100%; } }
        @keyframes move-up { from { bottom: -100px; } to { bottom: 100%; } }

        /* PIN modal styling for overlay */
        .pin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* default to not block when closed */
            z-index: 10005;
        }

        .pin-modal.show {
            display: flex;
            pointer-events: auto;
        }

        .pin-modal.hidden {
            display: none !important;
            pointer-events: none !important;
        }

        .pin-content {
            background: linear-gradient(180deg, rgba(20, 20, 30, 0.98) 0%, rgba(18, 18, 24, 0.98) 100%);
            border-radius: 14px;
            padding: 18px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
            color: #e6eef8;
        }

        .pin-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .pin-description {
            font-size: 12px;
            color: #a8b3c7;
            margin-bottom: 10px;
        }

        .pin-input {
            font-size: 22px;
            text-align: center;
            letter-spacing: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            width: 100%;
        }

        .pin-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .button {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .button-primary {
            background: #667eea;
            color: white;
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #dfe7ff;
        }

        /* Action Status Pill */
        .action-status-pill {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(88, 28, 135, 0.4); /* Deep purple accent */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(168, 85, 247, 0.5);
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .action-status-pill.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .action-status-pill .status-icon {
            min-width: 16px;
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-status-pill .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .action-status-pill .status-icon.success::before {
            content: '✓';
            color: #4ade80;
            font-weight: bold;
        }

        .action-status-pill .status-icon.error::before {
            content: '✕';
            color: #f87171;
            font-weight: bold;
        }

        .action-status-pill .status-icon.error {
            content: '';
        }

        .action-status-pill .action-text {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>
    <!-- Floating Button -->
    <div class="floating-button" id="floatingButton">
        <img class="logo" id="floatingLogo" src="./assets/icons/icon-removebg-preview.png" alt="Open" />
    </div>

    <!-- PIN Modal (overlay) -->
    <div class="pin-modal" id="overlayPinModal" style="display:none; align-items:center; justify-content:center;">
        <div class="pin-content" style="width:260px;">
            <div class="pin-title">Enter PIN</div>
            <div class="pin-description">This device is protected. Enter your PIN to continue.</div>
            <input type="password" id="overlayPinInput" class="pin-input" maxlength="4" placeholder="----"
                style="width:100%; margin-top:12px;">
            <div class="pin-buttons" style="margin-top:12px;">
                <button class="button button-secondary" id="overlayPinCancel">Cancel</button>
                <button class="button button-primary" id="overlayPinConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Visual Effects Container -->
    <div id="visualEffects"></div>

    <!-- Status Indicator -->
    <div class="status-indicator" id="statusIndicator"></div>

    <!-- Action Status Pill -->
    <div class="action-status-pill" id="actionStatusPill">
        <div class="status-icon running">
            <div class="spinner"></div>
        </div>
        <div class="action-text" id="actionStatusText">Starting action...</div>
    </div>

    <!-- Notification Indicator -->
    <div class="notification-indicator" id="notificationIndicator"></div>

    <!-- Flash Overlay (brief full-screen flash) -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- Edge Glow Effect -->
    <div class="edge-glow" id="edgeGlow"></div>

    <!-- Border Streak Effect -->
    <div class="border-streak" id="borderStreak">
        <div class="streak-line streak-top"></div>
        <div class="streak-line streak-right"></div>
        <div class="streak-line streak-bottom"></div>
        <div class="streak-line streak-left"></div>
    </div>

    <script>
        // MainOverlay class
        class MainOverlay {
            constructor() {
                this.floatingButton = document.getElementById('floatingButton');
                this.statusIndicator = document.getElementById('statusIndicator');
                this.notificationIndicator = document.getElementById('notificationIndicator');
                this.edgeGlow = document.getElementById('edgeGlow');
                this.borderStreak = document.getElementById('borderStreak');
                this.flashOverlay = document.getElementById('flashOverlay');
                this.visualEffects = document.getElementById('visualEffects');

                this.isGlowIntended = false;
                this.chatVisible = false;
                this.isDragging = false;
                this.dragStartX = 0;
                this.dragStartY = 0;
                this.buttonStartX = 0;
                this.buttonStartY = 0;

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.setupDragHandling();
                this.setupIPCListeners();
                this.loadFloatingButtonVisibility();
                this.checkAppLock();
            }

            async loadFloatingButtonVisibility() {
                try {
                    if (window.settingsAPI && window.settingsAPI.getSettings) {
                        const settings = await window.settingsAPI.getSettings();
                        console.log('[MainOverlay] Loading floating button visibility. Settings:', settings.floatingButtonVisible);
                        if (settings.chatVisible !== undefined) {
                            this.chatVisible = settings.chatVisible;
                        }
                        if (settings.theme) {
                            this.applyTheme(settings.theme);
                        }
                        this.updateFloatingButtonState();
                    } else {
                        this.showFloatingButton();
                    }
                } catch (error) {
                    console.error('[MainOverlay] Error loading floating button visibility:', error);
                    this.showFloatingButton();
                }
            }

            applyTheme(theme) {
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }

            async updateFloatingButtonState() {
                const enabled = await this.isFloatingButtonEnabled();
                if (enabled && !this.chatVisible) {
                    this.showFloatingButton();
                } else {
                    this.hideFloatingButton();
                }
            }

            async checkAppLock() {
                try {
                    if (window.electronAPI && window.electronAPI.isAppLocked) {
                        const isLocked = await window.electronAPI.isAppLocked();
                        console.log('[MainOverlay] App is locked:', isLocked);
                        if (isLocked) {
                            setTimeout(() => this.showPinModal(), 500);
                        }
                    }
                } catch (e) {
                    console.error('[MainOverlay] Error checking app lock:', e);
                }
            }

            setupEventListeners() {
                // Double-click to open chat
                this.floatingButton.addEventListener('dblclick', (e) => {
                    e.preventDefault();
                    this.openChat();
                });

                // Hover events
                this.floatingButton.addEventListener('mouseenter', () => {
                    if (window.electronAPI && window.electronAPI.overlayHover) {
                        window.electronAPI.overlayHover(true);
                    }
                });

                this.floatingButton.addEventListener('mouseleave', () => {
                    if (window.electronAPI && window.electronAPI.overlayHover) {
                        window.electronAPI.overlayHover(false);
                    }
                });

                // Prevent context menu
                document.addEventListener('contextmenu', (e) => e.preventDefault());

                // Pill click listener
                const pill = document.getElementById('actionStatusPill');
                if (pill) {
                    pill.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.openChat();
                    });
                    // Ensure hover state passes through for overlay interaction
                    pill.addEventListener('mouseenter', () => {
                        if (window.electronAPI && window.electronAPI.overlayHover) window.electronAPI.overlayHover(true);
                    });
                    pill.addEventListener('mouseleave', () => {
                        if (window.electronAPI && window.electronAPI.overlayHover) window.electronAPI.overlayHover(false);
                    });
                }
            }

            setupIPCListeners() {
                if (window.electronAPI) {
                    window.electronAPI.onShowFloatingButton(async () => {
                        console.log('[Overlay] onShowFloatingButton received');
                        this.chatVisible = false;
                        this.updateFloatingButtonState();
                    });
                    window.electronAPI.onHideFloatingButton(() => {
                        console.log('[Overlay] onHideFloatingButton received - hiding');
                        this.chatVisible = true;
                        this.updateFloatingButtonState();
                    });

                    window.electronAPI.onShowFloatingButtonIfEnabled(async () => {
                        this.chatVisible = false;
                        this.updateFloatingButtonState();
                    });
                    window.electronAPI.onHideFloatingButtonIfEnabled(async () => {
                        this.chatVisible = true;
                        this.updateFloatingButtonState();
                    });

                    window.electronAPI.onVisualEffect((event, data) => this.showVisualEffect(data && data.type));

                    window.electronAPI.onInteractionModeChanged((event, data) => {
                        if (data && typeof data.interactive === 'boolean') {
                            if (!data.interactive) {
                                document.body.classList.add('non-interactive');
                            } else {
                                document.body.classList.remove('non-interactive');
                            }
                        }
                    });

                    window.electronAPI.onRequestPinAndToggle(() => {
                        this.showPinModal();
                    });

                    window.electronAPI.onFloatingButtonToggle((event, visible) => {
                        this.updateFloatingButtonState();
                    });

                    window.electronAPI.onSettingsUpdated?.((event, settings) => {
                        if (settings.chatVisible !== undefined) {
                            this.chatVisible = settings.chatVisible;
                        }
                        if (settings.edgeGlowEnabled === false) {
                            this.hideEdgeGlow();
                        }
                        if (settings.borderStreakEnabled === false) {
                            this.hideBorderStreak();
                        }
                        if (settings.theme) {
                            this.applyTheme(settings.theme);
                        }
                        this.updateFloatingButtonState();
                    });

                    window.electronAPI.onActionStart(async (event, data) => {
                        this.isGlowIntended = true;
                        if (!this.edgeGlow.classList.contains('active')) {
                            this.showActionStatus(data || 'Executing action');
                            const [glowEnabled, streakEnabled] = await Promise.all([
                                this.isEdgeGlowEnabled(),
                                this.isBorderStreakEnabled()
                            ]);

                            if (glowEnabled && this.isGlowIntended) {
                                this.showFlashOverlay();
                                this.showEdgeGlow();
                            }
                            if (streakEnabled && this.isGlowIntended) {
                                this.showBorderStreak();
                            }
                        }
                    });

                    window.electronAPI.onActionStep((event, data) => {
                        if (data && data.description) {
                            const statusText = document.getElementById('actionStatusText');
                            if (statusText) statusText.textContent = data.description;
                        }
                    });

                    window.electronAPI.onActionComplete((event, data) => {
                        this.updateActionStatus((data && data.description) || 'Action complete', !!(data && data.success));
                        if (data && data.success === false) {
                            this.hideEdgeGlow();
                            this.hideBorderStreak();
                        }
                    });

                    window.electronAPI.onTaskStart(async (event, data) => {
                        this.isGlowIntended = true;
                        this.showActionStatus((data && data.task) || 'Starting task');
                        const [glowEnabled, streakEnabled] = await Promise.all([
                            this.isEdgeGlowEnabled(),
                            this.isBorderStreakEnabled()
                        ]);

                        if (glowEnabled && this.isGlowIntended) {
                            this.showFlashOverlay();
                            this.showEdgeGlow();
                        }
                        if (streakEnabled && this.isGlowIntended) {
                            this.showBorderStreak();
                        }
                    });

                    window.electronAPI.onTaskComplete((event, data) => {
                        this.updateActionStatus((data && data.task) || 'Task complete', !!(data && data.success));
                        this.hideEdgeGlow();
                        this.hideBorderStreak();
                    });

                    window.electronAPI.onTaskStopped((event, data) => {
                        this.hideActionStatus();
                        this.hideEdgeGlow();
                        this.hideBorderStreak();
                    });

                    window.electronAPI.onAIResponse?.(async (event, data) => {
                        try {
                            const glowEnabled = await this.isEdgeGlowEnabled();
                            if (!glowEnabled) {
                                this.hideEdgeGlow();
                                this.flashOverlay.classList.remove('active');
                            }
                            const streakEnabled = await this.isBorderStreakEnabled();
                            if (!streakEnabled) {
                                this.hideBorderStreak();
                            }
                        } catch (e) {}
                    });
                }
            }

            async openChat() {
                try {
                    if (window.electronAPI && window.electronAPI.toggleChat) {
                        await window.electronAPI.toggleChat();
                    }
                } catch (error) {
                    console.error('[Overlay] Failed to open chat:', error);
                }
            }

            showPinModal() {
                const pm = document.getElementById('overlayPinModal');
                const pinInput = document.getElementById('overlayPinInput');

                if (window.electronAPI && window.electronAPI.overlayHover) window.electronAPI.overlayHover(true);
                if (window.electronAPI && window.electronAPI.focusOverlay) window.electronAPI.focusOverlay();

                document.body.classList.remove('non-interactive');
                pm.style.display = 'flex';
                pm.classList.remove('hidden');
                pm.classList.add('show');
                pm.style.pointerEvents = 'auto';
                pinInput.value = '';

                setTimeout(() => {
                    try { pinInput.focus(); pinInput.select(); } catch (e) {}
                }, 100);

                let isSubmitting = false;

                const cleanup = () => {
                    isSubmitting = true;
                    pm.style.display = 'none';
                    pm.classList.remove('show');
                    pm.classList.add('hidden');
                    pm.style.pointerEvents = 'none';

                    document.getElementById('overlayPinConfirm').removeEventListener('click', confirmHandler);
                    document.getElementById('overlayPinCancel').removeEventListener('click', cancelHandler);
                    pm.removeEventListener('click', backdropHandler);
                    pinInput.removeEventListener('input', autoHandler);
                    pinInput.removeEventListener('keypress', keyHandler);

                    if (window.electronAPI && window.electronAPI.overlayHover) window.electronAPI.overlayHover(false);
                    try { pinInput.blur(); } catch (e) { }
                    document.body.classList.add('non-interactive');
                };

                const confirmHandler = async () => {
                    if (isSubmitting) return;
                    isSubmitting = true;
                    const pin = pinInput.value.trim();

                    try {
                        const res = await window.electronAPI.verifyPin(pin);
                        if (res && (res.valid === true || res.valid === 'true')) {
                            this.showStatus('Welcome!', 'success');
                            cleanup();
                            if (window.electronAPI && window.electronAPI.unlockApp) await window.electronAPI.unlockApp(pin);
                            if (window.electronAPI && window.electronAPI.toggleChat) await window.electronAPI.toggleChat();
                        } else {
                            isSubmitting = false;
                            this.showStatus(res?.message || 'Incorrect PIN', 'error');
                            pinInput.value = '';
                            setTimeout(() => { try { pinInput.focus(); } catch (e) { } }, 100);
                        }
                    } catch (e) {
                        isSubmitting = false;
                        this.showStatus('PIN verification failed', 'error');
                        pinInput.value = '';
                        setTimeout(() => { try { pinInput.focus(); } catch (e) { } }, 100);
                    }
                };

                const cancelHandler = () => cleanup();
                const backdropHandler = (e) => { if (e.target.id === 'overlayPinModal') cleanup(); };
                const autoHandler = (e) => {
                    const v = e.target.value.replace(/[^0-9]/g, '');
                    e.target.value = v;
                    if (v.length === 4 && !isSubmitting) confirmHandler();
                };
                const keyHandler = (e) => { if (e.key === 'Enter' && !isSubmitting) confirmHandler(); };

                pinInput.addEventListener('input', autoHandler);
                pinInput.addEventListener('keypress', keyHandler);
                document.getElementById('overlayPinConfirm').addEventListener('click', confirmHandler);
                document.getElementById('overlayPinCancel').addEventListener('click', cancelHandler);
                pm.addEventListener('click', backdropHandler, { capture: false });
            }

            setupDragHandling() {
                const buttonSize = 32;
                const offsetX = buttonSize / 2;
                const offsetY = buttonSize / 2;

                this.floatingButton.addEventListener('mousedown', (e) => {
                    if (e.button === 0) {
                        this.isDragging = true;
                        this.floatingButton.style.cursor = 'grabbing';
                        e.preventDefault();
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        let newX = e.clientX - offsetX;
                        let newY = e.clientY - offsetY;
                        const windowWidth = window.innerWidth;
                        const windowHeight = window.innerHeight;
                        newX = Math.max(0, Math.min(newX, windowWidth - buttonSize));
                        newY = Math.max(0, Math.min(newY, windowHeight - buttonSize));
                        this.floatingButton.style.left = newX + 'px';
                        this.floatingButton.style.top = newY + 'px';
                        this.floatingButton.style.right = 'auto';
                        this.floatingButton.style.bottom = 'auto';
                    }
                });

                document.addEventListener('mouseup', () => {
                    if (this.isDragging) {
                        this.isDragging = false;
                        this.floatingButton.style.cursor = 'grab';
                        this.snapToEdge();
                    }
                });
            }

            snapToEdge() {
                const rect = this.floatingButton.getBoundingClientRect();
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                const buttonSize = 32;

                const distToLeft = rect.left;
                const distToRight = windowWidth - rect.right;
                const distToTop = rect.top;
                const distToBottom = windowHeight - rect.bottom;

                const minDist = Math.min(distToLeft, distToRight, distToTop, distToBottom);

                if (minDist === distToLeft) {
                    this.floatingButton.style.left = '0';
                    this.floatingButton.style.top = (rect.top) + 'px';
                } else if (minDist === distToRight) {
                    this.floatingButton.style.right = '0';
                    this.floatingButton.style.left = 'auto';
                } else if (minDist === distToTop) {
                    this.floatingButton.style.top = '0';
                } else {
                    this.floatingButton.style.bottom = '0';
                    this.floatingButton.style.top = 'auto';
                }
            }

            async showFloatingButton() {
                if (!await this.isFloatingButtonEnabled()) return;
                this.floatingButton.classList.remove('hidden');
                this.floatingButton.style.visibility = 'visible';
                this.floatingButton.style.pointerEvents = 'auto';
            }

            hideFloatingButton() {
                this.floatingButton.classList.add('hidden');
                this.floatingButton.style.visibility = 'hidden';
                this.floatingButton.style.pointerEvents = 'none';
            }

            async showVisualEffect(effectType) {
                switch (effectType) {
                    case 'task-active':
                        this.isGlowIntended = true;
                        const [glowEnabled, streakEnabled] = await Promise.all([
                            this.isEdgeGlowEnabled(),
                            this.isBorderStreakEnabled()
                        ]);
                        if (glowEnabled && this.isGlowIntended) {
                            this.showFlashOverlay();
                            this.showEdgeGlow();
                        }
                        if (streakEnabled && this.isGlowIntended) {
                            this.showBorderStreak();
                        }
                        break;
                    case 'task-inactive':
                        this.isGlowIntended = false;
                        this.hideEdgeGlow();
                        this.hideBorderStreak();
                        break;
                }
            }

            async showFlashOverlay() {
                if (!this.isGlowIntended || !await this.isEdgeGlowEnabled()) return;
                this.flashOverlay.classList.add('active');
                setTimeout(() => this.flashOverlay.classList.remove('active'), 1000);
            }

            async showEdgeGlow() {
                if (!this.isGlowIntended || !await this.isEdgeGlowEnabled()) return;
                this.edgeGlow.classList.remove('immediate-hide');
                this.edgeGlow.classList.add('active');
            }

            hideEdgeGlow() {
                this.isGlowIntended = false;
                this.edgeGlow.classList.remove('active');
                this.flashOverlay.classList.remove('active');
                this.edgeGlow.classList.add('immediate-hide');
                setTimeout(() => { if (this.edgeGlow) this.edgeGlow.classList.remove('immediate-hide'); }, 200);
            }

            showBorderStreak() {
                if (this.borderStreak) this.borderStreak.classList.add('active');
            }

            hideBorderStreak() {
                if (this.borderStreak) this.borderStreak.classList.remove('active');
            }

            async isBorderStreakEnabled() {
                try {
                    const settings = await window.settingsAPI.getSettings();
                    return settings.borderStreakEnabled !== false;
                } catch (e) { return true; }
            }

            async isEdgeGlowEnabled() {
                try {
                    const settings = await window.settingsAPI.getSettings();
                    return settings.edgeGlowEnabled !== false;
                } catch (e) { return true; }
            }

            async isFloatingButtonEnabled() {
                try {
                    const settings = await window.settingsAPI.getSettings();
                    return settings.floatingButtonVisible !== false;
                } catch (e) { return true; }
            }

            showStatus(message, type = 'info') {
                this.statusIndicator.textContent = message;
                this.statusIndicator.className = `status-indicator show ${type}`;
                setTimeout(() => this.statusIndicator.classList.remove('show'), 3000);
            }

            showActionStatus(description) {
                const pill = document.getElementById('actionStatusPill');
                const statusIcon = pill.querySelector('.status-icon');
                document.getElementById('actionStatusText').textContent = description;
                statusIcon.className = 'status-icon running';
                statusIcon.innerHTML = '<div class="spinner"></div>';
                pill.classList.add('show');
            }

            updateActionStatus(description, success) {
                const pill = document.getElementById('actionStatusPill');
                const statusIcon = pill.querySelector('.status-icon');
                document.getElementById('actionStatusText').textContent = description;
                statusIcon.className = `status-icon ${success ? 'success' : 'error'}`;
                statusIcon.innerHTML = success ? '✓' : '✕';
                setTimeout(() => pill.classList.remove('show'), 3000);
            }

            hideActionStatus() {
                document.getElementById('actionStatusPill').classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => { new MainOverlay(); });
    </script>
</body>

</html>
